<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Where Winds Meet?</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffeef2, #ffffff, #ffd6e0);
            color: #4a4a5a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
            position: relative;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.4;
            color: #333344;
            max-width: 90vw;
            z-index: 10;
        }

        .game-area {
            position: relative;
            width: 80vw;
            height: 30vh; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }

        .btn {
            padding: 14px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            touch-action: manipulation;
        }

        #yesBtn {
            background: linear-gradient(135deg, #0ab844, #1ad333);
            color: rgb(255, 255, 255);
            z-index: 15;
            position: relative;
        }

        #noBtn {
            background: linear-gradient(135deg, #cf4141, #c50d0d);
            color: white;
            z-index: 5;
            position: relative;
        }

        #noPlaceholder {
            display: none;
            visibility: hidden;
            pointer-events: none;
        }

        .smooth-move {
            transition: left 1.1s cubic-bezier(0.16, 1, 0.3, 1), 
                        top 1.1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .big-popup-image {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 85vw;
            max-width: 420px;
            height: 320px;
            object-fit: cover;
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(244, 63, 94, 0.25);
            border: 4px solid #ffffff;
            z-index: 95;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1),
                        transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .image-active {
            visibility: visible;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        #successCard {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 20;
            animation: fadeIn 0.8s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #successCard h2 {
            font-size: 2.3rem;
            color: #ff3366;
            margin-bottom: 15px;
        }
        
        #successCard p {
            font-size: 1.8rem;
            color: #555566;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <canvas id="fireworksCanvas"></canvas>

    <img id="giantMeme" class="big-popup-image" src="https://media1.tenor.com/m/rwAJhBMitCkAAAAC/thats-right.gif" alt="Thats right">

    <h1 id="questionText">psst psst..Would you like to play where winds meet together?</h1>
    
    <div class="game-area" id="mainGameArea">
        <button class="btn" id="yesBtn">Yes</button>
        <button class="btn" id="noBtn">No</button>
        <button class="btn" id="noPlaceholder">No</button>
    </div>

    <div id="successCard">
        <h2>Let's Go! 🎉</h2>
        <p>Meet me where the winds meet!</p>
        <p>-KageGa</p>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const noPlaceholder = document.getElementById('noPlaceholder');
        const mainGameArea = document.getElementById('mainGameArea');
        const questionText = document.getElementById('questionText');
        const successCard = document.getElementById('successCard');
        const giantMeme = document.getElementById('giantMeme');
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');

        let interactionCount = 0;
        let particles = [];
        let animationFrameId;
        let blockInteraction = false;
        let lastTouchTime = 0; // Tracks timestamps to eliminate ghost clicks

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function getSafeBoundsPosition(currentX, currentY) {
            const containerRect = mainGameArea.getBoundingClientRect();
            const edgePadding = 30; 
            const maxX = containerRect.width - noBtn.clientWidth - edgePadding;
            const maxY = containerRect.height - noBtn.clientHeight - edgePadding;
            
            let targetX, targetY, distance;
            let attempts = 0;

            do {
                targetX = Math.floor(Math.random() * (maxX - edgePadding)) + edgePadding;
                targetY = Math.floor(Math.random() * (maxY - edgePadding)) + edgePadding;
                distance = Math.hypot(targetX - currentX, targetY - currentY);
                attempts++;
            } while ((distance < 80 || distance > 180) && attempts < 25); 

            return { x: targetX, y: targetY };
        }

        function escapeNoButton(e) {
            // Prevent standard touch zooming/scrolling defaults
            if (e.type === 'touchstart') {
                e.preventDefault();
                lastTouchTime = Date.now(); // Record when a touch happened
            }

            // GHOST CLICK PROTECTION: If a pointer event fires right after a touch event, drop it.
            if (e.type === 'pointerenter' && (Date.now() - lastTouchTime < 500)) {
                return;
            }

            if (blockInteraction) return;

            interactionCount++;

            if (noBtn.style.position !== 'absolute') {
                const rect = noBtn.getBoundingClientRect();
                const containerRect = mainGameArea.getBoundingClientRect();
                
                noPlaceholder.style.display = 'block';
                
                noBtn.style.position = 'absolute';
                noBtn.style.left = `${rect.left - containerRect.left}px`;
                noBtn.style.top = `${rect.top - containerRect.top}px`;
                
                setTimeout(() => {
                    noBtn.classList.add('smooth-move');
                }, 20);
            }

            const currX = parseFloat(noBtn.style.left) || noBtn.offsetLeft;
            const currY = parseFloat(noBtn.style.top) || noBtn.offsetTop;

            const containerRect = mainGameArea.getBoundingClientRect();
            const paddingLimit = 25;
            const absoluteMaxX = containerRect.width - noBtn.clientWidth - paddingLimit;
            const absoluteMaxY = containerRect.height - noBtn.clientHeight - paddingLimit;

            // Sequential Movement Tracks
            if (interactionCount === 1) {
                noBtn.style.left = `${absoluteMaxX}px`;
                noBtn.style.top = `${paddingLimit}px`;
            } 
            else if (interactionCount === 2) {
                noBtn.style.left = `${paddingLimit}px`;
                noBtn.style.top = `${absoluteMaxY}px`;
            } 
            else if (interactionCount === 3) {
                noBtn.style.left = `${absoluteMaxX / 2}px`;
                noBtn.style.top = `${paddingLimit}px`;
            } 
            else if (interactionCount === 4) {
                const yesRect = yesBtn.getBoundingClientRect();
                noBtn.style.left = `${(yesRect.right - containerRect.left) + 15}px`;
                noBtn.style.top = `${absoluteMaxY / 2}px`;

                blockInteraction = true;
                setTimeout(() => {
                    giantMeme.classList.add('image-active');
                }, 250);

                setTimeout(() => {
                    giantMeme.classList.remove('image-active');
                    blockInteraction = false;
                }, 3250); 
            } 
            else if (interactionCount >= 5) {
                if (yesBtn.style.position !== 'absolute') {
                    const yesRect = yesBtn.getBoundingClientRect();
                    
                    yesBtn.style.position = 'absolute';
                    yesBtn.style.left = `${yesRect.left - containerRect.left}px`;
                    yesBtn.style.top = `${yesRect.top - containerRect.top}px`;
                    
                    setTimeout(() => {
                        yesBtn.classList.add('smooth-move');
                    }, 20);
                }

                yesBtn.style.left = noBtn.style.left;
                yesBtn.style.top = noBtn.style.top;
                yesBtn.style.zIndex = '20';

                setTimeout(() => {
                    const newPos = getSafeBoundsPosition(currX, currY);
                    noBtn.style.left = `${newPos.x}px`;
                    noBtn.style.top = `${newPos.y}px`;
                }, 250); 
            }
        }

        // Keep both listeners but filter out overlapping hardware events via the debounce logic above
        noBtn.addEventListener('touchstart', escapeNoButton, { passive: false });
        noBtn.addEventListener('pointerenter', escapeNoButton);

        // Particle System Engine
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 3 + 1.5;
                this.velocity = {
                    x: (Math.random() - 0.5) * 9,
                    y: (Math.random() - 0.5) * 9
                };
                this.alpha = 1;
                this.decay = Math.random() * 0.012 + 0.012;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.velocity.y += 0.06;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= this.decay;
            }
        }

        function createFirework(x, y) {
            const colors = ['#ff3366', '#ff99bb', '#ff0055', '#ff66aa', '#ffffff', '#ffccd5'];
            const chosenColor = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 45; i++) {
                particles.push(new Particle(x, y, chosenColor));
            }
        }

        function animateFireworks() {
            animationFrameId = requestAnimationFrame(animateFireworks);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (Math.random() < 0.06) {
                createFirework(Math.random() * canvas.width, Math.random() * (canvas.height * 0.6));
            }

            particles.forEach((particle, index) => {
                if (particle.alpha <= 0) {
                    particles.splice(index, 1);
                } else {
                    particle.update();
                    particle.draw();
                }
            });
        }

        yesBtn.addEventListener('click', () => {
            if (blockInteraction) return;
            questionText.style.display = 'none';
            mainGameArea.style.display = 'none';
            successCard.style.display = 'flex';
            
            createFirework(canvas.width / 2, canvas.height / 3);
            createFirework(canvas.width / 4, canvas.height / 2);
            createFirework((canvas.width / 4) * 3, canvas.height / 2);
            
            animateFireworks();
        });
    </script>
</body>
</html>
